site_name: HomeBotAI
site_url: https://kanakjr.github.io/homebot/
site_description: Intelligent smart-home assistant powered by LangChain + Gemini, with live Home Assistant awareness, learnable skills, and a modern dashboard.
repo_url: https://github.com/Kanakjr/homebot
repo_name: Kanakjr/homebot

copyright: Copyright 2024-2026 HomeBotAI

theme:
  name: material
  custom_dir: overrides
  logo: assets/bot-profile.png
  favicon: assets/bot-profile.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - announce.dismiss

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - glightbox

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kanakjr/homebot
  generator: false

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Features:
    - AI Dashboard: features/ai-dashboard.md
    - Smart Features: features/smart-features.md
    - Media Discovery: features/media-discovery.md
  - Deep Agent: deep-agent.md
  - Transcoder: transcoder.md
  - API Reference: api-reference.md
  - LLM Benchmarks: benchmarks.md
  - Roadmap: roadmap.md
